openapi: 3.0.1
info:
  title: Foccacia API
  description: This is a simple API for managing teams and groups of teams 
  contact:
    email1: a51557@alunos.isel.pt
    email2: a51854@alunos.isel.pt
    email3: a50506@alunos.isel.pt
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
servers:
  - description: Localhost server for testing API
    url: http://localhost:3310

security:
  - bearerAuth: []
tags:
  - name: Groups
  - name: Users
  - name: Teams
  - name: Leagues
paths:
/users:
  description: The resource that contains all users
  post:
    tags:
      - Users
    summary: adds a user
    description: Adds a user to the system
    operationId: addUser
    security: []
    requestBody:
      description: User to add
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NewUser'
      required: true
    responses:
      201:
        description: user created
        content:
          application/json:
            schema:
              required:
                - token
              type: object
              properties:
                token:
                  type: string
                  format: uuid
      400:
        description: Invalid input, object invalid
        content: {}

  /api/groups:
    description: Resource that contains all Groups
    get:
      tags:
        - Groups
      summary: Get Groups
      description: By passing in the appropriate options, you can search for available
        Groups
      operationId: getGroups
      parameters:
        - name: q
          in: query
          description: Query to match in group title
          schema: 
            type: string
          required: false
        - name: limit
          in: query
          description: number of groups to return
          schema:
            default: 30
            minimum: 0
            type: integer
          required: false
        - name: skip
          in: query
          description: The page number
          schema:
            minimum: 0
            default: 0
            type: integer
          required: false

      responses:
        200:
          description: get all groups, with the specified criteria and pagination 
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Group'
        400:
          $ref: "#/components/responses/400BadRequest"          
    post:
      tags:
      - Groups
      summary: adds a group
      description: Adds a group to the system
      operationId: addGroup
      security:
        - bearerAuth: []
      requestBody:
        description: Group to add
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewGroup'
        required: false
      responses:
        201:
          description: Group created
          content: 
            application/json:
              schema:
                $ref: '#/components/schemas/NewGroupCreated'
        400:
          $ref: "#/components/responses/400BadRequest"
  /api/groups/{groupId}:
    description: The resource that represents one Group
    get:
      tags:
      - Groups
      summary: Get a group given its id
      operationId: getGroupById
      security:
        - bearerAuth: []
      parameters:
      - name: groupId
        in: path
        description: ID of group that to be fetched
        required: true
        schema:
          type: integer
          minimum: 1
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        400:
          $ref: "#/components/responses/400BadRequest"
        404:
          $ref: "#/components/responses/404NotFound"                
    put:
      tags:
      - Groups
      summary: updates a group
      description: Updates a Group in the system
      operationId: updateGroup
      parameters:
      - name: groupId
        in: path
        description: ID of the group to be deleted
        required: true
        schema:
          type: integer
      requestBody:
        description: Group to add
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewGroup'
        required: false
      responses:
        201:
          description: group updated
          content: 
            application/json:
              schema: 
                type: object
                properties: 
                  message:
                    type: string
                    example: "Group with id 1 updated"

        404:
          $ref: "#/components/responses/404NotFound"  
    delete:
      tags:
      - Groups
      summary: Delete a group by ID
      description: Delete a group by ID
      operationId: deleteGroup
      parameters:
      - name: groupId
        in: path
        description: ID of the group to be deleted
        required: true
        schema:
          type: integer
      responses:
        200:
          description: "Group successfully deleted"
          content: {}
        400:
          $ref: "#/components/responses/400BadRequest"
        404:
          $ref: "#/components/responses/404NotFound"
components:
  securitySchemes:
    bearerAuth:            # arbitrary name for the security scheme
      type: http
      scheme: bearer
  schemas:
    NewGroup:
      required:
      - title
      - isbn
      type: object
      properties:
        title:
          type: string
          example: Gatsby 
        isbn:
          type: string
          example: 978-3-16-148410-0
    Group:
      allOf: 
        - type: object
        - $ref: "#/components/schemas/NewGroup"
          required:
          - id
          - ownerId
          properties:
            id:
              type: integer
              example: 1
            userId:
              type: integer
              example: 1
    NewUser:
      type: object
      required:
      - userName
      properties:
        userName:
          type: string
          example: antonio.silva
    NewGroupCreated:
      required:
      - status
      - group
      type: object
      properties:
        status:
          type: string
          example: Group with id 123 created with success
        group:
          $ref: '#/components/schemas/Group'
    MissingParameter:
      type: object
      properties:
        status: 
          type: integer
          example: 1
        error:
          type: string
          example: "Missing required parameter"
    InvalidBody:
      type: object
      properties:
        error:
          type: string
          example: "Invalid body content"
    NotFound: 
      type: object
      properties:
        uri:
          type: string
          format: uri
          example: "/groups/1"
        description:
          type: string
          example: "Group with id 1 not found"
  responses: 
    404NotFound:
      description: "Resource not found"
      content: 
        application/json:
          schema: 
            $ref: "#/components/schemas/NotFound"
    400BadRequest:
      description: "Invalid Request because of a missing Parameter or invalid body content"
      content: 
        application/json:
          schema: 
            oneOf:
              - $ref: "#/components/schemas/MissingParameter"
              - $ref: "#/components/schemas/InvalidBody"
